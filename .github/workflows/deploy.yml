name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Stamp service worker cache version
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|const VERSION = 'dev'|const VERSION = '$SHA'|" public/sw.js
      - name: Write production env
        run: |
          SHA=$(git rev-parse --short HEAD)
          COMMIT_TIME=$(git log -1 --format=%cI HEAD)
          cat <<EOF > .env.production
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_STRAVA_CLIENT_ID=${{ secrets.STRAVA_CLIENT_ID }}
          VITE_GOOGLE_HEALTH_CLIENT_ID=${{ secrets.GOOGLE_HEALTH_CLIENT_ID }}
          VITE_APP_VERSION=$SHA
          VITE_COMMIT_TIME=$COMMIT_TIME
          EOF
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - id: deployment
        uses: actions/deploy-pages@v4
