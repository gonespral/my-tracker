name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bust asset cache
        run: |
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|style\.css?v=[^\"]*|style.css?v=$SHA|g" index.html
          sed -i "s|app\.js?v=[^\"]*|app.js?v=$SHA|g" index.html
      - name: Generate env.js from secrets
        run: |
          echo "export const SUPABASE_URL = \"${{ secrets.SUPABASE_URL }}\"" > js/env.js
          echo "export const SUPABASE_ANON_KEY = \"${{ secrets.SUPABASE_ANON_KEY }}\"" >> js/env.js
          echo "export const STRAVA_CLIENT_ID = \"${{ secrets.STRAVA_CLIENT_ID }}\"" >> js/env.js
          echo "export const GOOGLE_HEALTH_CLIENT_ID = \"${{ secrets.GOOGLE_HEALTH_CLIENT_ID }}\"" >> js/env.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
